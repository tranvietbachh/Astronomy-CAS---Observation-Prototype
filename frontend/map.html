<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Map</title>
  <link rel="icon" href="isaklogo.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.css" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      background: url('peakpx.jpg') no-repeat center center fixed;
      background-size: 110%;
      background-color: black;
      animation: bgMove 80s linear infinite;
      color: white;
    }

    @keyframes bgMove {
      0% { background-position: center top; }
      50% { background-position: center bottom; }
      100% { background-position: center top; }
    }

    .container {
      width: 100%;
      min-height: 100vh;
      position: relative;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(0,0,0,0.4);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo img {
      width: 50px;
    }

    .logo span {
      font-size: 20px;
      font-weight: 600;
    }

    .nav-links {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: white;
      font-size: 14px;
      letter-spacing: 1px;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -5px;
      width: 0%;
      height: 2px;
      background: #b983ff;
      transition: width 0.3s ease;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 20px;
      border: 2px solid #b983ff;
      background: transparent;
      color: #b983ff;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: #b983ff;
      color: black;
      box-shadow: 0 0 20px #b983ff;
    }

    .map-section {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 20px 100px;
    }

    .map-wrapper {
      width: 85%;
      max-width: 1100px;
      height: 500px;
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .coord-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 2;
      background: rgba(0,0,0,0.75);
      padding: 14px 16px;
      border-radius: 14px;
      min-width: 240px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .coord-panel h3 {
      font-size: 16px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .coord-panel p {
      font-size: 13px;
      opacity: 0.9;
      margin-bottom: 6px;
    }

    .coord-value {
      color: #b983ff;
      font-weight: 600;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 40px;
      font-size: 12px;
      opacity: 0.8;
    }

    .instagram {
      border: 1px solid white;
      border-radius: 50%;
      padding: 5px 8px;
      display: inline-block;
      margin-top: 5px;
      color: white;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="navbar">
      <div class="logo">
        <img src="isaklogo.png" alt="logo">
        <span>PROJECT ASTRONOMY</span>
      </div>

      <div class="nav-links">
        <a href="home.html">HOME</a>
        <a href="map.html">WEATHER MAP</a>
        <button class="btn" onclick="location.href='dashboard.html'">DASHBOARD</button>
      </div>
    </div>

    <div class="map-section">
      <div class="map-wrapper">
        <div class="coord-panel">
          <h3>Selected Coordinates</h3>
          <p>Latitude: <span class="coord-value" id="lat">Not selected</span></p>
          <p>Longitude: <span class="coord-value" id="lon">Not selected</span></p>
        </div>
        <div id="map"></div>
      </div>
    </div>

    <div class="footer">
      <div>
        <div>Connect</div>
        <a href="https://www.instagram.com/astronomy_cas" target="_blank" class="instagram">IG</a>
      </div>
      <div>
        © 2026 Project Astronomy. All rights reserved
      </div>
    </div>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.js"></script>
  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoidHJhbnZpZXRiYWNoaCIsImEiOiJjbWg3ODdyOTIwa3BoMnFuMTgzMG53aTVvIn0.fFCUoS361Nr5j5iebeqrzw';

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/dark-v11',
      center: [138.5565, 36.3591],
      zoom: 5
    });

    let marker = null;

    map.on('click', (e) => {
      const lat = e.lngLat.lat.toFixed(6);
      const lon = e.lngLat.lng.toFixed(6);

      document.getElementById('lat').textContent = lat;
      document.getElementById('lon').textContent = lon;

      if (marker) {
        marker.remove();
      }

      marker = new mapboxgl.Marker()
        .setLngLat([e.lngLat.lng, e.lngLat.lat])
        .addTo(map);

      localStorage.setItem('selectedLat', lat);
      localStorage.setItem('selectedLon', lon);
    });
  </script>
</body>
</html>
